<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botón ONLY Neón Correcto</title>
    <style>
        /* Fondo negro y centrado absoluto en la página */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000; /* Fondo negro absoluto */
            font-family: 'Arial Black', Gadget, sans-serif; /* Fuente imponente */
        }

        /* CAMBIO CLAVE: Ahora los estilos se aplican a la clase .boton-enlace */
        .boton-enlace {
            position: relative;
            display: inline-block; /* Permite que tome el tamaño correcto siendo un enlace */
            text-decoration: none; /* Quita el subrayado feo de los enlaces */
            padding: 20px 55px; /* MÁS GRANDE: Aumentado el tamaño del botón */
            border-radius: 10px;
            border: 2px solid #111111; /* Borde oscuro casi invisible al inicio */
            font-size: 26px; /* MÁS GRANDE: Letras más imponentes */
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 4px;
            background: #050505; /* Fondo negro mate */
            color: #1a1a1a; /* La palabra ONLY aparece casi invisible/oculta */
            overflow: hidden;
            box-shadow: 0 0 0 0 transparent;
            cursor: pointer;
            
            -webkit-transition: all 0.3s ease-in;
            -moz-transition: all 0.3s ease-in;
            transition: all 0.3s ease-in;
        }

        /* TU HOVER MODIFICADO (Efecto Rojo Neón Encendido) */
        .boton-enlace:hover {
            color: #ffffff; /* La palabra ONLY se enciende en blanco brillante */
            background: #1a0000; /* Un fondo rojo oscuro profundo */
            border-color: #ff0000; /* Borde rojo neón */
            
            /* Sombra neón expansiva y efecto 3D con relieve hacia abajo */
            box-shadow: 0 0 15px #ff0000, 
                        0 0 40px rgba(255, 0, 0, 0.6),
                        0 6px 0px #b30000; /* Relieve 3D inferior */
            
            transform: translateY(-4px); /* Se eleva un poco al activarse */

            -webkit-transition: all 0.2s ease-out;
            -moz-transition: all 0.2s ease-out;
            transition: all 0.2s ease-out;
        }

        /* Tu efecto de destello de luz blanco cuando pasa el mouse */
        .boton-enlace:hover::before {
            -webkit-animation: sh02 0.5s 0s linear;
            -moz-animation: sh02 0.5s 0s linear;
            animation: sh02 0.5s 0s linear;
        }

        .boton-enlace::before {
            content: '';
            display: block;
            width: 0px;
            height: 86%;
            position: absolute;
            top: 7%;
            left: 0%;
            opacity: 0;
            background: #fff;
            box-shadow: 0 0 50px 30px #fff;
            -webkit-transform: skewX(-20deg);
            -moz-transform: skewX(-20deg);
            -ms-transform: skewX(-20deg);
            -o-transform: skewX(-20deg);
            transform: skewX(-20deg);
        }

        /* Animación del destello cruzando el botón */
        @keyframes sh02 {
            from {
                opacity: 0;
                left: 0%;
            }
            50% {
                opacity: 1;
            }
            to {
                opacity: 0;
                left: 100%;
            }
        }

        /* Al hacer clic (Efecto mecánico de pulsación 3D) */
        .boton-enlace:active {
            transform: translateY(2px); /* Se hunde */
            box-shadow: 0 0 10px #ff0000, 
                        0 2px 0px #b30000; /* El relieve se reduce */
            
            -webkit-transition: box-shadow 0.1s ease-in;
            -moz-transition: box-shadow 0.1s ease-in;
            transition: box-shadow 0.1s ease-in;
        }
    </style>
</head>
<body>

    <a href="archi.html" class="boton-enlace">ONLY</a>

</body>
</html>

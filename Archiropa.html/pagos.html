<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra | Archiv Sport</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="checkout-container">
        <h2>FINALIZAR TU PEDIDO</h2>
        <p class="checkout-sub">Ingresa tus datos para asegurar tu pieza del Archivo.</p>
        
        <!-- FORMULARIO DE EJEMPLO -->
        <form action="#" method="POST" class="checkout-form">
            <input type="text" placeholder="Nombre completo" required class="input-field">
            <input type="email" placeholder="Correo electrónico" required class="input-field">
            <input type="text" placeholder="Dirección de envío" required class="input-field">
            
            <!-- AQUÍ ESTÁ LA CASILLA DE ACEPTACIÓN OBLIGATORIA -->
            <div class="checkout-acceptance">
                <label class="checkbox-container">
                    <input type="checkbox" id="accept-terms" required>
                    <span class="checkmark"></span>
                    He leído y acepto los <a href="terminos y condiciones.html" target="_blank">Términos y Condiciones</a> de Archiv Sport.
                </label>
            </div>

            <button type="submit" class="btn-buy">REALIZAR PAGO</button>
        </form>
    </div>

</body>
<style>* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Helvetica Neue', Arial, sans-serif;
}

body {
    background-color: var(--negro-fondo);
            /* AQUÍ SE ADJUNTA TU IMAGEN COMO FONDO GENERAL DE LA WEB */
            background-image: linear-gradient(rgba(10, 5, 13, 0.85), rgba(10, 5, 13, 0.85)), 
                              url('https://static.vecteezy.com/system/resources/thumbnails/020/171/692/small/fire-liquid-iridescent-background-iridescent-chrome-wavy-gradient-abstract-background-holographic-fire-texture-liquid-surface-ripples-reflection-photo.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: var(--blanco);
            overflow-x: hidden;
            padding-bottom: 100px;
}

/* CONTENEDOR PRINCIPAL TÉRMINOS */
.archiv-container {
    max-width: 750px;
    margin: 0 auto;
}

/* ESTILO DE MARCA (CABECERA) */
.archiv-header {
    text-align: center;
    margin-bottom: 60px;
}

.brand-title {
    font-size: 2.8rem;
    font-weight: 900;
    letter-spacing: 6px;
    color: #fff;
    margin-bottom: 5px;
}

.tagline {
    font-size: 0.85rem;
    letter-spacing: 4px;
    color: #888;
    text-transform: uppercase;
}

.divider {
    width: 40px;
    height: 2px;
    background-color: #fff;
    margin: 25px auto;
}

/* MANIFIESTO */
.manifesto-box {
    background-color: #121212;
    padding: 35px;
    border: 1px solid #222;
    text-align: left;
    margin-top: 30px;
}

.manifesto-box h2 {
    font-size: 1.1rem;
    letter-spacing: 2px;
    margin-bottom: 15px;
    color: #fff;
}

.italic-text {
    font-style: italic;
    color: #aaa;
    margin-bottom: 20px;
}

.manifesto-box p {
    font-size: 0.95rem;
    color: #ccc;
    margin-bottom: 15px;
}

.welcome-text {
    font-weight: bold;
    letter-spacing: 2px;
    margin-top: 25px;
    color: #fff;
}

/* SECCIÓN DE TÉRMINOS */
.terms-section {
    margin-top: 60px;
}

.section-title {
    font-size: 1.4rem;
    letter-spacing: 3px;
    margin-bottom: 40px;
    border-bottom: 1px solid #222;
    padding-bottom: 10px;
}

.term-block {
    margin-bottom: 35px;
}

.term-block h4 {
    font-size: 1rem;
    letter-spacing: 1px;
    color: #fff;
    margin-bottom: 12px;
    font-weight: 700;
}

.term-block p, .term-block li {
    font-size: 0.9rem;
    color: #aaa;
    text-align: justify;
}

.term-block ul {
    margin-left: 20px;
    margin-top: 10px;
}

.term-block li {
    margin-bottom: 8px;
}

.brand-link {
    color: #fff;
    text-decoration: underline;
    transition: color 0.3s ease;
}

.brand-link:hover {
    color: #888;
}

/* --- ESTILOS EXTRA PARA LA PANTALLA DE PAGO (CHECKOUT) --- */
.checkout-container {
    max-width: 450px;
    margin: 0 auto;
    background-color: #121212;
    padding: 40px;
    border: 1px solid #222;
    text-align: center;
}

.checkout-container h2 {
    font-size: 1.5rem;
    letter-spacing: 3px;
    margin-bottom: 5px;
    color: #ffffff;
}

.checkout-sub {
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 30px;
}

.checkout-form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.input-field {
    width: 100%;
    padding: 12px;
    background-color: #0b0b0b;
    border: 1px solid #333;
    color: #fff;
    font-size: 0.9rem;
    outline: none;
    transition: border 0.3s;
}

.input-field:focus {
    border-color: #fff;
}

/* DISEÑO DE LA CASILLA DE VERIFICACIÓN */
.checkout-acceptance {
    margin: 15px 0;
    padding: 15px;
    background-color: #0b0b0b;
    border: 1px dashed #222;
    display: flex;
    justify-content: center;
}

.checkbox-container {
    font-size: 0.85rem;
    color: #aaa;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
}

.checkbox-container a {
    color: #fff;
    text-decoration: underline;
}

.checkbox-container input {
    accent-color: #fff; /* Checkbox en color blanco */
    width: 16px;
    height: 16px;
    cursor: pointer;
}

/* BOTÓN DE COMPRA */
.btn-buy {
    background-color: #fff;
    color: #000;
    border: none;
    padding: 15px;
    font-weight: bold;
    letter-spacing: 2px;
    cursor: pointer;
    transition: background 0.3s;
}

.btn-buy:hover {
    background-color: #ccc;
}</style>

</html>

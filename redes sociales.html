<style>
    /* --- ESTILOS GENERALES (Para computadora) --- */
.menu-derecha {
    display: flex;
    justify-content: flex-end;
}

.contenedor-carta {
    width: 300px; /* Tamaño normal en PC */
}


/* --- CÓDIGO PARA CELULARES (Pantallas menores a 768px) --- */
@media (max-width: 768px) {
    
    /* El cuerpo de la página ya no se desborda */
    body {
        padding: 10px;
        font-size: 14px; /* Achicamos un poco la letra si es necesario */
    }

    /* Si tus productos están en fila, en el celular se pondrán uno abajo del otro */
    .productos, .menu-derecha {
        flex-direction: column; 
        align-items: center;
        gap: 10px;
    }

    /* Las tarjetas de tus prendas se adaptarán al ancho de la pantalla del celular */
    .contenedor-carta {
        width: 100%; 
        max-width: 320px; /* Para que no se estiren infinitamente */
    }

    /* Ajustar imágenes para que nunca se salgan de su contenedor */
    img {
        max-width: 100%;
        height: auto;
    }
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: grid;
    align-items: center;
    justify-content: center;
    background-color: #000;
}

main {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;    
}

.icon {
    position: relative;
    width: 80px;
    height: 80px;
    margin: 20px;
    border-radius: 50%;
    transition: all .8s;
    cursor: pointer;
}

.icon:hover {
    background-color: #e60073;
    box-shadow:  0 0 20px #e60073 ;
}

.icon:hover:nth-child(2) {
    background-color: #1877f2;
    box-shadow:  0 0 20px #1877f2;
}

.icon:hover:nth-child(3) {
    background-color: #25d366;
    box-shadow: 0 0 20px #25d366 ;
}

.icon:hover:nth-child(4) {
    background-color: #000f17;
    box-shadow:  0 0 20px #891919 ;
}

.icon i {
    color: #fff;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    font-size: 1.7rem;
}

svg circle {
    stroke-dasharray: 150;
    transition: all .8s ease-in-out;
}

.icon:hover circle {
    stroke-dasharray: 220;
}
</style>
